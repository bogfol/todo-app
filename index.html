<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="list-sidebar" aria-label="Todo lists">
      <button id="new-list-button" type="button">New List</button>
      <ul id="todo-lists" class="list-nav"></ul>
    </aside>

    <main class="app">
      <div class="list-header">
        <h1 id="active-list-title">Main List</h1>
        <button
          id="delete-list-button"
          class="delete-list-button"
          type="button"
          aria-label="Delete current list"
          title="Delete current list"
        >
          &#128465;
        </button>
      </div>

      <form id="todo-form">
        <input id="todo-input" type="text" placeholder="Enter a task" />
        <select id="todo-priority" aria-label="Task priority">
          <option value="Low">Low</option>
          <option value="Medium" selected>Medium</option>
          <option value="High">High</option>
        </select>
        <input id="todo-due-date" type="date" aria-label="Due date" />
        <button type="submit">Add</button>
      </form>

      <div class="bulk-actions">
        <button id="mark-all-button" type="button">Mark All as Done</button>
        <button id="clear-button" type="button">Clear All</button>
      </div>

      <div class="task-grid task-header">
        <span>Task</span>
        <span>Priority</span>
        <span>Due Date</span>
        <span>Actions</span>
      </div>

      <ul id="todo-list"></ul>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
